<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Login</title>
</head>

<body class="paginaCadastro">

    <section class="ladoCadastroImagem">
        <img src="Imagens/Logo.png" class="logoCadastro" alt="Logo Chás da Laura">

        <h1>Sistema de Gestão<br>de Estoque</h1>

        <p>
            Organize, controle e acompanhe seu estoque em<br>
            tempo real de forma simples e inteligente
        </p>

        <img src="Imagens/ChaImagemMenu.png" class="imagemCadastroCha" alt="Chá da Laura">
    </section>

    <section class="ladoCadastroFormulario">

        <div class="cardLogin">

            <h2>Bem-vindo de volta!</h2>
            <p>Faça login para acessar sua conta</p>

            <form>
                <label>E-mail</label>
                <input type="email" placeholder="Digite seu e-mail">

                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha">

                <div class="linhaLogin">
                    <label class="lembrar">
                        <input type="checkbox"> Lembrar-me
                    </label>

                    <a href="redefinirsenha.html">Esqueci minha senha</a>
                </div>

                <button class="botaoCadastrar">Entrar</button>

                <p class="textoEntrar">
                    Não tem uma conta?
                    <a href="cadastro.html">Cadastrar-se</a>
                </p>
            </form>

        </div>

    </section>

</body>
</html>
